<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Cleanup Tool</title>
    <style>
        :root { --green: #1DB954; --bg: #121212; --card: #181818; --red: #e91429; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 40px; border-radius: 20px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.6); border: 1px solid #282828; }
        h1 { color: var(--green); margin-bottom: 5px; }
        p { color: #b3b3b3; font-size: 14px; margin-bottom: 30px; }
        .btn { background: var(--green); color: white; border: none; padding: 18px; border-radius: 40px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn:hover { transform: scale(1.02); filter: brightness(1.1); }
        .btn-red { background: var(--red); }
        #log { margin-top: 25px; text-align: left; font-size: 13px; background: #000; padding: 15px; border-radius: 10px; height: 140px; overflow-y: auto; color: #888; font-family: 'Courier New', Courier, monospace; border: 1px solid #333; }
        .loader { display: none; margin: 20px auto; width: 30px; height: 30px; border: 3px solid #333; border-top: 3px solid var(--green); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="card">
    <h1>Spotify Cleanup 🧹</h1>
    <p id="status">Zaloguj się, aby wyczyścić bibliotekę.</p>
    <div class="loader" id="loader"></div>
    <button id="actionBtn" class="btn" onclick="handleAction()">Połącz ze Spotify</button>
    <div id="log">Gotowy do pracy...</div>
</div>

<script>
    // --- TWOJA KONFIGURACJA ---
    const clientId = '6d393cf1a59a4aa597d1cad60203db74'; // <--- WKLEJ SWÓJ CLIENT ID ZE STRONY SPOTIFY
    const redirectUri = 'https://sgcdaedalus83-wq.github.io/spotify-cleanup/';
    // --------------------------

    const scope = 'user-library-modify user-library-read playlist-modify-private playlist-modify-public user-follow-modify';
    
    // PKCE Helpers
    const generateRandomString = (length) => {
        const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        const values = crypto.getRandomValues(new Uint8Array(length));
        return Array.from(values).map(x => possible[x % possible.length]).join('');
    };

    const sha256 = async (plain) => {
        const encoder = new TextEncoder();
        const data = encoder.encode(plain);
        return window.crypto.subtle.digest('SHA-256', data);
    };

    const base64encode = (input) => {
        return btoa(String.fromCharCode(...new Uint8Array(input)))
            .replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
    };

    async function handleAction() {
        const token = localStorage.getItem('spotify_access_token');
        if (!token) {
            await redirectToAuth();
        } else {
            if(confirm("UWAGA: Czy na pewno chcesz NIEODWRACALNIE usunąć polubione utwory, albumy i playlisty?")) {
                startCleaning(token);
            }
        }
    }

    async function redirectToAuth() {
        const codeVerifier = generateRandomString(64);
        const hashed = await sha256(codeVerifier);
        const codeChallenge = base64encode(hashed);

        window.localStorage.setItem('code_verifier', codeVerifier);

        const params = new URLSearchParams({
            response_type: 'code',
            client_id: clientId,
            scope,
            code_challenge_method: 'S256',
            code_challenge: codeChallenge,
            redirect_uri: redirectUri,
        });

        window.location.href = 'https://accounts.spotify.com/authorize?' + params.toString();
    }

    window.onload = async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        if (code) {
            document.getElementById('loader').style.display = 'block';
            const codeVerifier = localStorage.getItem('code_verifier');
            
            const body = new URLSearchParams({
                grant_type: 'authorization_code',
                code: code,
                redirect_uri: redirectUri,
                client_id: clientId,
                code_verifier: codeVerifier,
            });

            try {
                const response = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: body
                });

                const data = await response.json();
                if (data.access_token) {
                    localStorage.setItem('spotify_access_token', data.access_token);
                    window.history.replaceState({}, document.title, window.location.pathname);
                    setupUI(true);
                }
            } catch (e) {
                console.error(e);
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        } else if (localStorage.getItem('spotify_access_token')) {
            setupUI(true);
        }
    };

    function setupUI(isLoggedIn) {
        if (isLoggedIn) {
            document.getElementById('status').innerText = "Połączono! Kliknij poniżej, aby zacząć.";
            document.getElementById('actionBtn').innerText = "WYCZYŚĆ KONTO";
            document.getElementById('actionBtn').classList.add('btn-red');
        }
    }

    function log(msg) {
        const l = document.getElementById('log');
        l.innerHTML += `<div>> ${msg}</div>`;
        l.scrollTop = l.scrollHeight;
    }

    async function startCleaning(token) {
        document.getElementById('actionBtn').disabled = true;
        document.getElementById('actionBtn').style.opacity = '0.5';
        
        const endpoints = [
            { name: 'Utwory', url: 'https://api.spotify.com/v1/me/tracks' },
            { name: 'Albumy', url: 'https://api.spotify.com/v1/me/albums' },
            { name: 'Playlisty', url: 'https://api.spotify.com/v1/me/playlists' }
        ];

        for (let ep of endpoints) {
            log(`Szukam: ${ep.name}...`);
            try {
                let res = await fetch(ep.url + '?limit=50', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                let data = await res.json();

                if (data.items && data.items.length > 0) {
                    const ids = data.items.map(i => i.track?.id || i.album?.id || i.id);
                    log(`Usuwanie ${ids.length} sztuk...`);
                    
                    await fetch(ep.url, {
                        method: 'DELETE',
                        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                        body: JSON.stringify(ids)
                    });
                    log(`Sukces.`);
                } else {
                    log(`Brak ${ep.name} do usunięcia.`);
                }
            } catch (err) {
                log(`Błąd przy ${ep.name}.`);
            }
        }
        log('<b>PROCES ZAKOŃCZONY.</b>');
        alert("Twoje konto zostało wyczyszczone!");
        localStorage.removeItem('spotify_access_token');
        location.reload();
    }
</script>
</body>
</html>
